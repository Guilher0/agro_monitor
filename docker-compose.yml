services:
  # ─── Aplicação PHP + Nginx ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev   # usa o estágio de desenvolvimento com hot-reload
    image: agro_monitor_app
    container_name: agro_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor        # monta vendor do container (não do host)
      - /var/www/html/node_modules  # monta node_modules do container (não do host)
    ports:
      - "8000:80"   # Laravel / Nginx
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - agro_network

  # ─── Servidor de desenvolvimento Vite (hot-reload) ──────────────────────────
  vite:
    image: node:20-alpine
    container_name: agro_vite
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"   # Vite HMR
    command: npm run dev -- --host 0.0.0.0
    networks:
      - agro_network

  # ─── Banco de dados principal (Landlord) ────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: agro_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: agro_monitor
      MYSQL_USER: agro
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
      # Script de inicialização: cria permissões para o tenancy criar bancos tenant
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "agro", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agro_network

  # ─── Redis (cache, sessões e filas) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agro_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agro_network

  # ─── Worker de filas (processa jobs em background) ──────────────────────────
  queue:
    image: agro_monitor_app
    container_name: agro_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - agro_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  agro_network:
    driver: bridge
